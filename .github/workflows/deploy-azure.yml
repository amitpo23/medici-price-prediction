name: Deploy to Azure App Service

# Disabled — deploy is done manually via `python3 build_deploy.py --deploy`
# AZURE_WEBAPP_PUBLISH_PROFILE secret is not configured, so auto-deploy fails on every push.
# To re-enable: configure the secret in GitHub settings and restore the `push` trigger.
on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.9"
  APP_NAME: "medici-prediction-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deploy.txt

      - name: Basic import smoke test
        run: |
          python -c "from src.api.main import app; print(app.title)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
