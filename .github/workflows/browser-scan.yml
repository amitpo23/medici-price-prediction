name: Browser Price Check Scan

on:
  schedule:
    # Twice daily (08:00 + 20:00 UTC = 11:00 + 23:00 Israel). Aligned with
    # caj-visibility-probe in rg-medici-agents so browser + API scan the same
    # (hotel, date) set in overlapping windows, which makes vw_VenueVisibilityAll
    # directly comparable. Cutover 2026-04-24: local launchd browser-scan is
    # retired → GHA is now the sole producer.
    - cron: '0 8,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB write)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: browser-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run browser scan
        env:
          INNSTANT_USER:    ${{ secrets.INNSTANT_USER }}
          INNSTANT_PASS:    ${{ secrets.INNSTANT_PASS }}
          INNSTANT_ACCOUNT: ${{ secrets.INNSTANT_ACCOUNT }}
          SOURCE_DB_SERVER: ${{ secrets.SOURCE_DB_SERVER }}
          SOURCE_DB_NAME:   ${{ secrets.SOURCE_DB_NAME }}
          SOURCE_DB_USER:   ${{ secrets.SOURCE_DB_USER }}
          SOURCE_DB_PASS:   ${{ secrets.SOURCE_DB_PASS }}
          SCAN_DB_SERVER:   ${{ secrets.SCAN_DB_SERVER }}
          SCAN_DB_NAME:     ${{ secrets.SCAN_DB_NAME }}
          SCAN_DB_USER:     ${{ secrets.SCAN_DB_USER }}
          SCAN_DB_PASS:     ${{ secrets.SCAN_DB_PASS }}
          # Cutover 2026-04-24: was BrowserScan@GHA-parallel, local was primary.
          # Local retired — GHA is sole producer now.
          CREATED_BY:       BrowserScan@GHA
        run: |
          FLAGS="--no-push"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          node scripts/browser_scan.js $FLAGS

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports-${{ github.run_id }}
          path: |
            scan-reports/
            shared-reports/
          retention-days: 30
          if-no-files-found: warn
