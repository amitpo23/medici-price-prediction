name: Browser Price Check Scan

on:
  schedule:
    # Every 3h, offset 90min from local cron (local: 0 0,3,6,9,...).
    # Avoids dual-login race on the shared Innstant B2B account.
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB write)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: browser-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run browser scan
        env:
          INNSTANT_USER:    ${{ secrets.INNSTANT_USER }}
          INNSTANT_PASS:    ${{ secrets.INNSTANT_PASS }}
          INNSTANT_ACCOUNT: ${{ secrets.INNSTANT_ACCOUNT }}
          SOURCE_DB_SERVER: ${{ secrets.SOURCE_DB_SERVER }}
          SOURCE_DB_NAME:   ${{ secrets.SOURCE_DB_NAME }}
          SOURCE_DB_USER:   ${{ secrets.SOURCE_DB_USER }}
          SOURCE_DB_PASS:   ${{ secrets.SOURCE_DB_PASS }}
          SCAN_DB_SERVER:   ${{ secrets.SCAN_DB_SERVER }}
          SCAN_DB_NAME:     ${{ secrets.SCAN_DB_NAME }}
          SCAN_DB_USER:     ${{ secrets.SCAN_DB_USER }}
          SCAN_DB_PASS:     ${{ secrets.SCAN_DB_PASS }}
          # Tags rows written by this workflow — flip to BrowserScan@GHA after cutover.
          CREATED_BY:       BrowserScan@GHA-parallel
        run: |
          FLAGS="--no-push"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          node scripts/browser_scan.js $FLAGS

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports-${{ github.run_id }}
          path: |
            scan-reports/
            shared-reports/
          retention-days: 30
          if-no-files-found: warn
